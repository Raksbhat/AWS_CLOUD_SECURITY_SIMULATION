<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AWS Cloud Security Automation Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #020b14;
  --bg2: #040f1c;
  --panel: #071828;
  --border: #0f3050;
  --accent: #00d4ff;
  --accent2: #ff4c4c;
  --accent3: #00ff99;
  --warn: #ffb800;
  --purple: #b47dff;
  --orange: #ff9500;
  --text: #c8e8ff;
  --dim: #4a7a9b;
  --glow: 0 0 20px rgba(0,212,255,0.3);
  --glow-red: 0 0 20px rgba(255,76,76,0.4);
  --glow-green: 0 0 20px rgba(0,255,153,0.3);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index:0; pointer-events:none;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events:none; z-index:9999;
}

/* \u2500\u2500 NAV \u2500\u2500 */
nav {
  position:fixed; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 20px;
  background:rgba(2,11,20,0.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(14px);
  z-index:1000; gap:12px;
}

.logo {
  font-family:'Orbitron',monospace;
  font-size:clamp(0.8rem,3.5vw,1.05rem);
  font-weight:900; color:var(--accent);
  text-shadow:var(--glow); letter-spacing:2px; white-space:nowrap;
}
.logo span { color:var(--accent2); }

.status-badge {
  display:flex; align-items:center; gap:6px;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.52rem,1.8vw,0.68rem);
  color:var(--accent3); white-space:nowrap;
}
.status-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--accent3); box-shadow:0 0 8px var(--accent3);
  animation:blink 1.4s ease-in-out infinite; flex-shrink:0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.nav-links {
  display:none;
  position:fixed; top:54px; left:0; right:0;
  background:rgba(2,11,20,0.98);
  border-bottom:1px solid var(--border);
  padding:16px 20px;
  flex-direction:column; gap:0; z-index:999;
}
.nav-links.open { display:flex; }
.nav-links a {
  font-family:'Share Tech Mono',monospace;
  font-size:0.75rem; color:var(--dim);
  text-decoration:none; letter-spacing:2px;
  padding:12px 0; border-bottom:1px solid var(--border);
  transition:color 0.2s;
}
.nav-links a:last-child { border-bottom:none; }
.nav-links a:hover { color:var(--accent); }

.hamburger {
  display:flex; flex-direction:column; gap:5px;
  cursor:pointer; background:none; border:none; padding:4px;
}
.hamburger span { display:block; width:22px; height:2px; background:var(--accent); }

@media(min-width:640px) {
  .hamburger { display:none; }
  .nav-links {
    display:flex !important; position:static;
    flex-direction:row; gap:20px; padding:0;
    background:none; border:none;
  }
  .nav-links a { border:none; padding:0; font-size:0.68rem; }
}

/* \u2500\u2500 TICKER \u2500\u2500 */
.ticker-wrap {
  margin-top:54px;
  background:rgba(255,76,76,0.07);
  border-top:1px solid rgba(255,76,76,0.2);
  border-bottom:1px solid rgba(255,76,76,0.2);
  padding:9px 0; overflow:hidden; white-space:nowrap;
  position:relative; z-index:1;
}
.ticker-inner {
  display:inline-block;
  animation:ticker 40s linear infinite;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.58rem,2vw,0.7rem);
  color:var(--accent2); letter-spacing:1.5px; padding-right:60px;
}
@keyframes ticker { from{transform:translateX(100vw)} to{transform:translateX(-100%)} }

/* \u2500\u2500 HERO \u2500\u2500 */
.hero {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:52px 20px 60px;
}

.hero-eyebrow {
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.58rem,2.2vw,0.72rem);
  letter-spacing:4px; color:var(--accent);
  margin-bottom:20px; animation:fadeUp 0.8s ease both;
}

.hero h1 {
  font-family:'Orbitron',monospace;
  font-size:clamp(1.45rem,5.5vw,3.6rem);
  font-weight:900; line-height:1.12;
  letter-spacing:1px; text-transform:uppercase;
  color:#fff; animation:fadeUp 0.8s 0.1s ease both;
  max-width:780px;
}
.hero h1 em { font-style:normal; color:var(--accent); text-shadow:var(--glow); }

.hero-sub {
  margin-top:16px;
  font-size:clamp(0.9rem,2.8vw,1.05rem);
  color:var(--dim); max-width:600px; line-height:1.65;
  animation:fadeUp 0.8s 0.2s ease both; padding:0 8px;
}

.pipeline-label {
  margin-top:32px;
  display:flex; flex-wrap:wrap; align-items:center;
  justify-content:center; gap:6px;
  animation:fadeUp 0.8s 0.3s ease both;
}
.pipe-step {
  padding:8px 18px; border:1px solid;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.62rem,2.2vw,0.78rem);
  letter-spacing:2px; background:var(--panel);
}
.pipe-step.detect   { color:var(--warn);    border-color:var(--warn); }
.pipe-step.remediate{ color:var(--accent2); border-color:var(--accent2); }
.pipe-step.deploy   { color:var(--accent3); border-color:var(--accent3); }
